<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — ChemLink Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10181A; --paper:#F1F3EF; --surface:#FFFFFF;
    --navy:#0C2A2F; --orange:#DD5A26; --orange-ink:#8C3714;
    --green-tint:#E4F1EB; --green-ink:#0F4E3D;
    --red-tint:#FBE9E7; --red-ink:#7A2A21;
    --line:#DBDFD6; --line-on-navy:rgba(255,255,255,0.14);
    --muted:#5B655F; --muted-on-navy:#A9C2C1;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--navy);color:var(--ink);font-family:"IBM Plex Sans Thai","IBM Plex Sans",sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
  .mono{font-family:"IBM Plex Mono",monospace;}
  a{color:inherit;} img,svg{display:block;}
  :focus-visible{outline:2px solid var(--orange);outline-offset:2px;}

  .top{padding:24px 32px;}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;width:fit-content;}
  .brand-word{font-weight:600;font-size:18px;color:#fff;letter-spacing:-0.01em;}
  .brand-word span{color:var(--orange);}

  .center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border-radius:var(--radius-lg);padding:36px;max-width:420px;width:100%;}
  .card-title{font-size:22px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em;}
  .card-sub{font-size:13.5px;color:var(--muted);margin:0 0 26px;}

  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
  .field{margin-bottom:16px;}
  input[type=email], input[type=password]{
    width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 13px;
    font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);
  }
  input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(221,90,38,0.12);}

  .btn{font-family:inherit;font-size:14px;font-weight:600;padding:12px 18px;border-radius:var(--radius-sm);border:1.5px solid transparent;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-primary:hover{background:var(--orange-ink);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}

  .sign-hint{text-align:center;font-size:13.5px;color:var(--muted);margin-top:18px;}
  .sign-hint a{color:var(--orange-ink);font-weight:600;text-decoration:none;}

  .msg{border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .msg.error{background:var(--red-tint);color:var(--red-ink);}
  .msg.success{background:var(--green-tint);color:var(--green-ink);}

  .api-note{text-align:center;font-size:11.5px;color:var(--muted-on-navy);padding:20px;}
</style>
</head>
<body>

<div class="top">
  <a class="brand" href="index.html">
    <svg width="30" height="30" viewBox="0 0 34 34" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="32" height="32" rx="7" fill="rgba(255,255,255,0.08)" stroke="var(--line-on-navy)"/>
      <path d="M17 6L28 12V22L17 28L6 22V12L17 6Z" stroke="#DD5A26" stroke-width="1.6" stroke-linejoin="round"/>
      <circle cx="17" cy="17" r="3.4" fill="#DD5A26"/>
    </svg>
    <span class="brand-word">ChemLink <span>Platform</span></span>
  </a>
</div>

<div class="center">
  <div class="card">
    <h1 class="card-title">เข้าสู่ระบบ</h1>
    <p class="card-sub">เข้าสู่บัญชีบริษัทของคุณเพื่อจัดการ RFQ ใบเสนอราคา และ Deal Room</p>

    <div class="msg error" id="error-msg"></div>
    <div class="msg success" id="success-msg"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">อีเมล</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">เข้าสู่ระบบ</button>
    </form>

    <div class="sign-hint">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></div>
  </div>
</div>

<div class="api-note">API: <span id="api-base-label"></span> — ต้องรัน backend ในเครื่อง (docker compose up) จึงจะเข้าสู่ระบบได้จริง</div>

<script>
  const API_BASE_URL = 'http://localhost:3000/api/v1';
  document.getElementById('api-base-label').textContent = API_BASE_URL;

  function showMsg(id, text) {
    ['error-msg', 'success-msg'].forEach(m => document.getElementById(m).style.display = 'none');
    const el = document.getElementById(id);
    el.textContent = text;
    el.style.display = 'block';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ...';

    try {
      const res = await fetch(`${API_BASE_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(Array.isArray(data.message) ? data.message.join(', ') : (data.message || 'เข้าสู่ระบบไม่สำเร็จ'));
      }

      localStorage.setItem('chemlink_access_token', data.accessToken);
      localStorage.setItem('chemlink_refresh_token', data.refreshToken);
      localStorage.setItem('chemlink_user', JSON.stringify(data.user));

      showMsg('success-msg', `เข้าสู่ระบบสำเร็จ สวัสดีคุณ ${data.user.fullName}`);

      const redirect = new URLSearchParams(location.search).get('redirect');
      setTimeout(() => { location.href = redirect || 'index.html'; }, 900);
    } catch (err) {
      const isNetworkError = err instanceof TypeError;
      showMsg('error-msg', isNetworkError
        ? `เชื่อมต่อ API ที่ ${API_BASE_URL} ไม่ได้ — ตรวจสอบว่ารัน backend อยู่`
        : err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  });
</script>

</body>
</html>
