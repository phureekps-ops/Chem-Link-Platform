version: "3.9"

# Build Sequence Step 0 — local Dev environment.
# Mirrors the Dev/Staging/Prod separation called for in the System Design
# Document (Section 8.5, Section 16.2 step 0).
#
# NOTE: postgres is mapped to host port 5433 (not the default 5432)
# because this developer's machine already has a native PostgreSQL
# Windows service listening on 5432 — reusing 5432 here would silently
# connect to the wrong database server. The container still listens on
# 5432 *inside* Docker's own network; only the host-facing port changed.
# Update DATABASE_URL in your local .env to use port 5433 to match.

services:
  postgres:
    image: postgres:16-alpine
    container_name: chemlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chemlink
      POSTGRES_PASSWORD: chemlink_dev_password
      POSTGRES_DB: chemlink_dev
    ports:
      - "5433:5432"
    volumes:
      - chemlink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemlink -d chemlink_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chemlink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: chemlink-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://chemlink:chemlink_dev_password@postgres:5432/chemlink_dev?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

volumes:
  chemlink_postgres_data:
