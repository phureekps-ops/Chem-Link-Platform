name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chemlink
          POSTGRES_PASSWORD: chemlink_ci_password
          POSTGRES_DB: chemlink_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chemlink -d chemlink_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://chemlink:chemlink_ci_password@localhost:5432/chemlink_ci?schema=public"
      JWT_ACCESS_SECRET: "ci-access-secret"
      JWT_REFRESH_SECRET: "ci-refresh-secret"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prisma generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --ci
